<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUKAN FANS</title>
    <link rel="icon" type="image/png" href="image/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            box-sizing: border-box;
        }
        .upload-card {
            transition: all 0.3s ease;
            background: #fafafa;
        }
        .upload-card:hover {
            background: #f5f5f5;
            border-color: #d1d5db;
        }
        .upload-card.dragover {
            background: #f0f0f0;
            border-color: #9ca3af;
        }
        .file-uploaded {
            background: #f9f9f9;
            border-color: #10b981;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-white min-h-screen font-sans">
    <div class="container mx-auto px-6 py-12 max-w-2xl">
        <!-- Header -->
        <header class="text-center mb-16">
            <h1 class="text-4xl font-light text-gray-900 mb-3">Unfollowers</h1>
            <p class="text-gray-500 text-lg">Analisis sederhana untuk Instagram Anda</p>
        </header>

        <!-- Upload Section -->
        <div class="space-y-4 mb-12">
            <!-- Followers Upload -->
            <div class="upload-card rounded-2xl p-8 text-center cursor-pointer border border-gray-100" id="followersCard">
                <h3 class="text-xl font-medium text-gray-800 mb-2">Followers</h3>
                <p class="text-gray-400 mb-6">followers_1.json</p>
                <input type="file" id="followersFile" accept=".json" class="hidden">
                <button onclick="document.getElementById('followersFile').click()" class="bg-gray-900 text-white px-6 py-2 rounded-full text-sm font-medium hover:bg-gray-800 transition-colors">
                    Pilih File
                </button>
                <div id="followersStatus" class="mt-4 text-sm"></div>
            </div>

            <!-- Following Upload -->
            <div class="upload-card rounded-2xl p-8 text-center cursor-pointer border border-gray-100" id="followingCard">
                <h3 class="text-xl font-medium text-gray-800 mb-2">Following</h3>
                <p class="text-gray-400 mb-6">following.json</p>
                <input type="file" id="followingFile" accept=".json" class="hidden">
                <button onclick="document.getElementById('followingFile').click()" class="bg-gray-900 text-white px-6 py-2 rounded-full text-sm font-medium hover:bg-gray-800 transition-colors">
                    Pilih File
                </button>
                <div id="followingStatus" class="mt-4 text-sm"></div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex justify-center items-center gap-4 mb-16">
            <button id="restartBtn" onclick="restartUpload()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg text-sm font-medium transition-colors">
                Restart
            </button>
            <button id="compareBtn" disabled class="bg-gray-200 text-gray-400 px-6 py-3 rounded-lg text-sm font-medium cursor-not-allowed transition-all duration-300">
                Generate
            </button>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden fade-in">
            <div class="space-y-8">
                <div id="summaryStats" class="grid grid-cols-3 gap-6"></div>
                <div id="unfollowersList"></div>
            </div>
        </div>
    </div>

    <script>
        let followersData = null;
        let followingData = null;
        let lastNotFollowingBack = [];
        let lastYouDontFollowBack = [];

        document.getElementById('followersFile').addEventListener('change', e => handleFileUpload(e.target.files[0], 'followers'));
        document.getElementById('followingFile').addEventListener('change', e => handleFileUpload(e.target.files[0], 'following'));

        ['followersCard', 'followingCard'].forEach(cardId => {
            const card = document.getElementById(cardId);
            const fileType = cardId.replace('Card', '');
            card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('dragover'); });
            card.addEventListener('dragleave', () => card.classList.remove('dragover'));
            card.addEventListener('drop', e => {
                e.preventDefault(); card.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) handleFileUpload(e.dataTransfer.files[0], fileType);
            });
        });

        function handleFileUpload(file, type) {
            if (!file) return alert('Silakan pilih file terlebih dahulu');
            if (!file.name.toLowerCase().endsWith('.json')) return alert('Silakan upload file JSON yang valid');
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (type === 'followers') {
                        followersData = data;
                        updateFileStatus('followersStatus', file.name);
                        document.getElementById('followersCard').classList.add('file-uploaded');
                    } else {
                        followingData = data;
                        updateFileStatus('followingStatus', file.name);
                        document.getElementById('followingCard').classList.add('file-uploaded');
                    }
                    checkCompareButton();
                } catch (err) { alert('File JSON tidak valid: ' + err.message); }
            };
            reader.readAsText(file);
        }

        function updateFileStatus(id, name) {
            document.getElementById(id).innerHTML = `
                <div class="text-green-600 font-medium">✓ ${name}</div>
                <div class="text-xs text-gray-500 mt-1">File berhasil diupload</div>
            `;
        }

        function checkCompareButton() {
            const btn = document.getElementById('compareBtn');
            if (followersData && followingData) {
                btn.disabled = false;
                btn.className = 'bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg text-sm font-medium cursor-pointer transition-all duration-300';
                btn.onclick = compareData;
            }
        }

        function extractFollowersWithTimestamp(data) {
            const map = new Map();
            if (Array.isArray(data)) {
                data.forEach(item => {
                    const d = item.string_list_data?.[0];
                    const username = d?.value?.trim().toLowerCase();
                    if (username) map.set(username, d.timestamp || 0);
                });
            }
            return map;
        }

        function extractFollowingWithTimestamp(data) {
            const map = new Map();
            const list = data.relationships_following;
            if (Array.isArray(list)) {
                list.forEach(item => {
                    const d = item.string_list_data?.[0];
                    const username = (d?.value || item.title)?.trim().toLowerCase();
                    if (username) map.set(username, d?.timestamp || 0);
                });
            }
            return map;
        }

        function compareData() {
            try {
                const followersMap = extractFollowersWithTimestamp(followersData);
                const followingMap = extractFollowingWithTimestamp(followingData);
                const followers = Array.from(followersMap.keys());
                const following = Array.from(followingMap.keys());
                if (!followers.length || !following.length) return alert('Data JSON tidak sesuai format');

                const notFollowingBack = following.filter(u => !followers.includes(u))
                    .map(u => ({ username: u, timestamp: followingMap.get(u) }))
                    .sort((a, b) => b.timestamp - a.timestamp); // urut terbaru

                const youDontFollowBack = followers.filter(u => !following.includes(u))
                    .map(u => ({ username: u, timestamp: followersMap.get(u) }))
                    .sort((a, b) => b.timestamp - a.timestamp);

                lastNotFollowingBack = notFollowingBack;
                lastYouDontFollowBack = youDontFollowBack;
                displayResults(followers, following, notFollowingBack, youDontFollowBack);
            } catch (err) {
                alert('Terjadi kesalahan saat membandingkan data.');
                console.error(err);
            }
        }

        function displayResults(followers, following, notFollowingBack, youDontFollowBack) {
            document.getElementById('summaryStats').innerHTML = `
                <div class="text-center">
                    <div class="text-3xl font-light text-gray-900">${followers.length}</div>
                    <div class="text-sm text-gray-500 mt-1">Followers</div>
                </div>
                <div class="text-center">
                    <div class="text-3xl font-light text-gray-900">${following.length}</div>
                    <div class="text-sm text-gray-500 mt-1">Following</div>
                </div>
                <div class="text-center">
                    <div class="text-3xl font-light text-red-500">${notFollowingBack.length}</div>
                    <div class="text-sm text-gray-500 mt-1">Unfollowers</div>
                </div>
            `;

            document.getElementById('unfollowersList').innerHTML = `
                <div class="space-y-8">
                    <div>
                        <h3 class="text-xl font-medium text-gray-900 mb-4">Tidak Follow Balik (${notFollowingBack.length})</h3>
                        <div class="bg-gray-50 rounded-2xl p-6 max-h-96 overflow-y-auto">
                            ${notFollowingBack.length === 0 ? 
                                '<div class="text-center text-gray-500">Semua yang kamu follow juga follow balik!</div>' :
                                notFollowingBack.map((u,i)=>`
                                    <div class="flex items-center justify-between py-2 border-b border-gray-200 last:border-0">
                                        <div class="flex items-center gap-3">
                                            <span class="text-gray-400 text-sm font-medium w-8">#${i+1}</span>
                                            <span class="text-gray-800">@${u.username}</span>
                                        </div>
                                        <a href="https://instagram.com/${u.username}" target="_blank" rel="noopener noreferrer" class="text-gray-500 hover:text-gray-700 text-sm">Lihat →</a>
                                    </div>`).join('')}
                        </div>
                    </div>
                    <div>
                        <h3 class="text-xl font-medium text-gray-900 mb-4">Kamu Tidak Follow Balik (${youDontFollowBack.length})</h3>
                        <div class="bg-gray-50 rounded-2xl p-6 max-h-96 overflow-y-auto">
                            ${youDontFollowBack.length === 0 ? 
                                '<div class="text-center text-gray-500">Kamu sudah follow balik semua followers!</div>' :
                                youDontFollowBack.map((u,i)=>`
                                    <div class="flex items-center justify-between py-2 border-b border-gray-200 last:border-0">
                                        <div class="flex items-center gap-3">
                                            <span class="text-gray-400 text-sm font-medium w-8">#${i+1}</span>
                                            <span class="text-gray-800">@${u.username}</span>
                                        </div>
                                        <a href="https://instagram.com/${u.username}" target="_blank" rel="noopener noreferrer" class="text-gray-500 hover:text-gray-700 text-sm">Lihat →</a>
                                    </div>`).join('')}
                        </div>
                    </div>
                    <div class="text-center pt-4">
                        <button onclick="downloadReport()" class="bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                            Download Report
                        </button>
                    </div>
                </div>`;
            const results = document.getElementById('resultsSection');
            results.classList.remove('hidden');
            results.scrollIntoView({ behavior: 'smooth' });
        }

        function downloadReport() {
            let txt = "============================================================\n";
            txt += `🔴 Tidak Follow Balik (kamu follow, mereka tidak): ${lastNotFollowingBack.length}\n`;
            txt += "============================================================\n";
            lastNotFollowingBack.forEach((u,i)=>{ txt += `${i+1}. ${u.username} → https://instagram.com/${u.username}\n`; });
            txt += "\n\n============================================================\n";
            txt += `🟢 Kamu Tidak Follow Balik (mereka follow, kamu tidak): ${lastYouDontFollowBack.length}\n`;
            txt += "============================================================\n";
            lastYouDontFollowBack.forEach((u,i)=>{ txt += `${i+1}. ${u.username} → https://instagram.com/${u.username}\n`; });
            const blob = new Blob([txt], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'unfollowers_report.txt';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function restartUpload() {
            followersData = followingData = null;
            lastNotFollowingBack = lastYouDontFollowBack = [];
            document.getElementById('followersFile').value = '';
            document.getElementById('followingFile').value = '';
            ['followersCard','followingCard'].forEach(id=>{
                document.getElementById(id).classList.remove('file-uploaded');
            });
            document.getElementById('followersStatus').innerHTML = '';
            document.getElementById('followingStatus').innerHTML = '';
            const btn = document.getElementById('compareBtn');
            btn.disabled = true;
            btn.className = 'bg-gray-200 text-gray-400 px-6 py-3 rounded-lg text-sm font-medium cursor-not-allowed transition-all duration-300';
            document.getElementById('resultsSection').classList.add('hidden');
            window.scrollTo({top:0,behavior:'smooth'});
        }
    </script>
</body>
</html>
